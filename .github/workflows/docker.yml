name: CI/CD Docker

on:
  push:
    branches: [ "main" ]

jobs:
  build-test-push:
    runs-on: ubuntu-latest

    steps:
      # 1. Clonar o repo
      - name: Checkout código
        uses: actions/checkout@v4

      # 2. Login no Docker Hub
      - name: Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 3. Build da imagem
      - name: Build da imagem Docker
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/movieflix:latest .

      # 4. Rodar container para teste
      - name: Rodar container
        run: |
          docker run -d -p 3000:3000 --name test_app ${{ secrets.DOCKER_USERNAME }}/movieflix:latest
          sleep 10

      # 5. Teste simples (verificar resposta)
      - name: Testar aplicação
        run: |
          curl -f http://localhost:3000 || exit 1

      # 6. Parar container
      - name: Parar container
        run: docker stop test_app

      # 7. Push para Docker Hub
      - name: Push da imagem
        run: docker push ${{ secrets.DOCKER_USERNAME }}/movieflix:latest